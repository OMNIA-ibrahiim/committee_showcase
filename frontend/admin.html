<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Committee Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --card:    #16161f;
    --border:  rgba(255,255,255,0.07);
    --accent:  #6c63ff;
    --text:    #f0f0f8;
    --muted:   #7a7a9a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── login screen ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
  }

  .login-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .login-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 28px;
  }

  /* ── dashboard layout ── */
  .dashboard { display: none; min-height: 100vh; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 36px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .header-left { display: flex; align-items: center; gap: 20px; }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
  }

  .admin-badge {
    font-size: 11px;
    background: rgba(108,99,255,0.15);
    color: #a89cff;
    border: 1px solid rgba(108,99,255,0.2);
    padding: 3px 10px;
    border-radius: 100px;
    letter-spacing: 0.05em;
  }

  .header-right { display: flex; align-items: center; gap: 16px; }

  .pending-count {
    font-size: 13px;
    color: #fbbf24;
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.2);
    padding: 4px 12px;
    border-radius: 100px;
  }

  /* ── filter tabs ── */
  .filter-bar {
    display: flex;
    gap: 4px;
    padding: 24px 36px 0;
  }

  .filter-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .filter-tab.active {
    background: var(--card);
    color: var(--text);
    border-color: rgba(108,99,255,0.3);
  }

  /* ── content area ── */
  .content { padding: 24px 36px 60px; max-width: 1000px; }

  /* ── project card (admin style) ── */
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .project-card:hover { border-color: rgba(255,255,255,0.12); }

  .project-card-inner {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
  }

  .project-thumb {
    width: 200px;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
    background: #0d0d14;
  }

  .project-thumb-placeholder {
    width: 200px;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #111118, #1a1a28);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .project-info {
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .project-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .project-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .status-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    flex-shrink: 0;
    text-transform: capitalize;
  }
  .status-pending  { background: rgba(251,191,36,0.1);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
  .status-approved { background: rgba(74,222,128,0.1);  color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
  .status-rejected { background: rgba(255,101,132,0.1); color: #ff6584; border: 1px solid rgba(255,101,132,0.2); }

  .project-meta {
    font-size: 13px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .project-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .project-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .link-chip {
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 6px;
    transition: background 0.2s;
  }
  .link-chip:hover { background: rgba(108,99,255,0.08); }

  /* ── action bar ── */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
    flex-wrap: wrap;
  }

  .feedback-input {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
  }
  .feedback-input:focus { border-color: rgba(108,99,255,0.4); }
  .feedback-input::placeholder { color: var(--muted); opacity: 0.5; }

  .action-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-approve {
    background: rgba(74,222,128,0.15);
    color: #4ade80;
    border: 1px solid rgba(74,222,128,0.2);
  }
  .btn-approve:hover { background: rgba(74,222,128,0.25); }

  .btn-reject {
    background: rgba(255,101,132,0.1);
    color: #ff6584;
    border: 1px solid rgba(255,101,132,0.2);
  }
  .btn-reject:hover { background: rgba(255,101,132,0.2); }

  .btn-delete {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-delete:hover { color: #ff6584; border-color: rgba(255,101,132,0.3); }

  /* ── empty / error states ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  /* ── form elements (login) ── */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; }
  input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(108,99,255,0.5); }
  input::placeholder { color: var(--muted); opacity: 0.5; }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: #7d75ff; }

  .btn-sm {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-sm:hover { color: var(--text); }

  .alert-error {
    background: rgba(255,101,132,0.1);
    border: 1px solid rgba(255,101,132,0.2);
    color: #ff8fa8;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
  }
  .alert-error.show { display: block; }

  @media (max-width: 600px) {
    .project-card-inner { grid-template-columns: 1fr; }
    .project-thumb, .project-thumb-placeholder { width: 100%; }
    header { padding: 16px 20px; }
    .filter-bar, .content { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-label">Admin access</div>
    <div class="login-title">Committee Dashboard</div>
    <div class="alert-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="admin@..." required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Log in</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>
    <div class="header-left">
      <div class="logo">◈ Showcase</div>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="header-right">
      <span class="pending-count" id="pending-count" style="display:none"></span>
      <a href="index.html" class="btn-sm">View public page</a>
      <button class="btn-sm" onclick="logout()">Log out</button>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-tab active" onclick="setFilter('all',    this)">All</button>
    <button class="filter-tab"        onclick="setFilter('pending', this)">Pending</button>
    <button class="filter-tab"        onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-tab"        onclick="setFilter('rejected',this)">Rejected</button>
  </div>

  <div class="content" id="content">
    <p style="color:var(--muted);padding-top:24px">Loading projects…</p>
  </div>
</div>

<script>
  const API = 'http://localhost:3000';
  let allProjects = [];
  let currentFilter = 'all';
  let adminToken = null;

  // ── login ──────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Logging in…';

    const errEl = document.getElementById('login-error');
    errEl.classList.remove('show');

    try {
      const res  = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('l-email').value.trim(),
          password: document.getElementById('l-password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      if (data.user.role !== 'admin') throw new Error('This account does not have admin access.');

      adminToken = data.accessToken;
      localStorage.setItem('adminToken', adminToken);
      localStorage.setItem('adminRefreshToken', data.refreshToken);
      showDashboard();
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });

  function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadProjects();
  }

  // ── load all projects ──────────────────────────────────────
  async function loadProjects() {
    try {
      const res  = await fetch(`${API}/admin/projects`, {
        headers: { 'Authorization': `Bearer ${adminToken}` },
      });
      const data = await res.json();
      allProjects = data.projects || [];

      // Update pending badge
      const pending = allProjects.filter(p => p.status === 'pending').length;
      const badge   = document.getElementById('pending-count');
      if (pending > 0) {
        badge.textContent = `${pending} pending`;
        badge.style.display = 'inline';
      } else {
        badge.style.display = 'none';
      }

      renderProjects();
    } catch (err) {
      document.getElementById('content').innerHTML =
        `<p style="color:var(--muted);padding-top:24px">Could not load projects. Check console.</p>`;
    }
  }

  // ── filter ─────────────────────────────────────────────────
  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderProjects();
  }

  // ── render ─────────────────────────────────────────────────
  function renderProjects() {
    const filtered = currentFilter === 'all'
      ? allProjects
      : allProjects.filter(p => p.status === currentFilter);

    const content = document.getElementById('content');

    if (filtered.length === 0) {
      content.innerHTML = `<div class="empty-state">No ${currentFilter === 'all' ? '' : currentFilter} projects found.</div>`;
      return;
    }

    content.innerHTML = filtered.map(renderCard).join('');
  }

  function renderCard(p) {
    const thumb = p.image_urls && p.image_urls[0]
      ? `<img class="project-thumb" src="${p.image_urls[0]}" alt="" loading="lazy"/>`
      : `<div class="project-thumb-placeholder"><svg width="32" height="32" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;

    const links = [
      p.repo_url  ? `<a href="${p.repo_url}"  target="_blank" class="link-chip">↗ Repo</a>`  : '',
      p.demo_url  ? `<a href="${p.demo_url}"  target="_blank" class="link-chip">↗ Demo</a>`  : '',
      p.video_url ? `<a href="${p.video_url}" target="_blank" class="link-chip">↗ Video</a>` : '',
    ].filter(Boolean).join('');

    const actionBar = p.status === 'pending' ? `
      <div class="action-bar">
        <input class="feedback-input" id="fb-${p.id}" placeholder="Optional feedback for the member…"/>
        <button class="action-btn btn-approve" onclick="review('${p.id}', 'approved')">✓ Approve</button>
        <button class="action-btn btn-reject"  onclick="review('${p.id}', 'rejected')">✗ Reject</button>
        <button class="action-btn btn-delete"  onclick="deleteProject('${p.id}')">Delete</button>
      </div>` : `
      <div class="action-bar">
        <span style="font-size:13px;color:var(--muted)">
          Reviewed ${p.reviewed_at ? new Date(p.reviewed_at).toLocaleDateString() : ''}
          ${p.reviewed_by_name ? `by ${p.reviewed_by_name}` : ''}
          ${p.admin_feedback ? `· "${p.admin_feedback}"` : ''}
        </span>
        <button class="action-btn btn-approve" onclick="review('${p.id}', 'approved')" style="margin-left:auto">Re-approve</button>
        <button class="action-btn btn-reject"  onclick="review('${p.id}', 'rejected')">Re-reject</button>
        <button class="action-btn btn-delete"  onclick="deleteProject('${p.id}')">Delete</button>
      </div>`;

    return `
    <div class="project-card" id="card-${p.id}">
      <div class="project-card-inner">
        ${thumb}
        <div class="project-info">
          <div class="project-top">
            <div class="project-title">${p.title}</div>
            <span class="status-badge status-${p.status}">${p.status}</span>
          </div>
          <div class="project-meta">
            <span>by ${p.creator_name}</span>
            <span>·</span>
            <span>${p.submitted_by_name} (${p.submitted_by_email})</span>
            <span>·</span>
            <span>${new Date(p.submitted_at).toLocaleDateString()}</span>
          </div>
          <div class="project-desc">${p.description}</div>
          ${links ? `<div class="project-links">${links}</div>` : ''}
        </div>
      </div>
      ${actionBar}
    </div>`;
  }

  // ── approve / reject ───────────────────────────────────────
  async function review(id, status) {
    const feedbackEl = document.getElementById(`fb-${id}`);
    const feedback   = feedbackEl ? feedbackEl.value.trim() : '';

    try {
      const res  = await fetch(`${API}/admin/projects/${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${adminToken}`,
        },
        body: JSON.stringify({ status, feedback }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Update locally without full reload
      const idx = allProjects.findIndex(p => p.id === id);
      if (idx !== -1) {
        allProjects[idx].status         = status;
        allProjects[idx].admin_feedback = feedback || null;
        allProjects[idx].reviewed_at    = new Date().toISOString();
      }

      renderProjects();

      // Refresh pending count
      const pending = allProjects.filter(p => p.status === 'pending').length;
      const badge   = document.getElementById('pending-count');
      badge.textContent = `${pending} pending`;
      badge.style.display = pending > 0 ? 'inline' : 'none';

    } catch (err) {
      alert(`Error: ${err.message}`);
    }
  }

  // ── delete ─────────────────────────────────────────────────
  async function deleteProject(id) {
    if (!confirm('Permanently delete this project?')) return;

    try {
      const res = await fetch(`${API}/admin/projects/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${adminToken}` },
      });
      if (!res.ok) throw new Error('Delete failed');

      allProjects = allProjects.filter(p => p.id !== id);
      renderProjects();
    } catch (err) {
      alert(`Error: ${err.message}`);
    }
  }

  // ── logout ─────────────────────────────────────────────────
  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminRefreshToken');
    adminToken = null;
    document.getElementById('dashboard').style.display    = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  // ── auto-login: refresh token on load ─────────────────────
  async function init() {
    const refresh = localStorage.getItem('adminRefreshToken');
    if (!refresh) return;
    try {
      const res  = await fetch(`${API}/auth/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ refreshToken: refresh }),
      });
      if (!res.ok) throw new Error('expired');
      const data = await res.json();
      adminToken = data.accessToken;
      localStorage.setItem('adminToken', adminToken);
      showDashboard();
    } catch(e) {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminRefreshToken');
    }
  }
  init();
</script>
</body>
</html>
