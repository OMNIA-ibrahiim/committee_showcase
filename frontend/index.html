<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Committee Showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#ff6584;--text:#f0f0f8;--muted:#7a7a9a}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
  header{position:relative;padding:80px 40px 60px;text-align:center;overflow:hidden}
  header::after{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(108,99,255,0.2) 0%,transparent 70%);pointer-events:none}
  .committee-label{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(108,99,255,0.3);padding:6px 16px;border-radius:100px;margin-bottom:28px}
  h1{font-family:'Syne',sans-serif;font-size:clamp(2.5rem,6vw,4.5rem);font-weight:800;line-height:1.05;letter-spacing:-0.02em;margin-bottom:20px}
  h1 span{background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .subtitle{font-size:17px;color:var(--muted);font-weight:300;max-width:500px;margin:0 auto 40px}
  .header-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:10px 24px;border-radius:8px;cursor:pointer;text-decoration:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;border:none}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#7d75ff;transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.15)}
  .stats-bar{display:flex;justify-content:center;gap:48px;padding:24px 40px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:60px}
  .stat{text-align:center}
  .stat-number{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:var(--text)}
  .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
  main{max-width:1200px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
  .section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform 0.25s,border-color 0.25s,box-shadow 0.25s;display:flex;flex-direction:column;animation:fadeUp 0.5s ease both;cursor:pointer}
  .card:hover{transform:translateY(-4px);border-color:rgba(108,99,255,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.4),0 0 0 1px rgba(108,99,255,0.1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card-media{position:relative;width:100%;aspect-ratio:16/9;background:#0d0d14;overflow:hidden}
  .card-media img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
  .card:hover .card-media img{transform:scale(1.04)}
  .card-media iframe,.card-media video{width:100%;height:100%;object-fit:cover;border:none;pointer-events:none}
  .media-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#111118,#1a1a28)}
  .card-body{padding:22px 24px;flex:1;display:flex;flex-direction:column;gap:12px}
  .card-meta{display:flex;align-items:center;justify-content:space-between}
  .creator-pill{display:flex;align-items:center;gap:8px}
  .avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
  .creator-name{font-size:13px;font-weight:500;color:var(--muted)}
  .card-date{font-size:12px;color:var(--muted);opacity:0.6}
  .card-title{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;line-height:1.3;color:var(--text)}
  .card-desc{font-size:14px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .card-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .link-btn{font-size:12px;font-weight:500;color:var(--accent);text-decoration:none;padding:5px 12px;border:1px solid rgba(108,99,255,0.3);border-radius:6px;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .link-btn:hover{background:rgba(108,99,255,0.1);border-color:var(--accent)}
  .link-btn.secondary{color:var(--muted);border-color:var(--border)}
  .link-btn.postman{color:#ff6c37;border-color:rgba(255,108,55,0.3)}
  .link-btn.postman:hover{background:rgba(255,108,55,0.08);border-color:#ff6c37}
  .link-btn.secondary:hover{color:var(--text);border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04)}
  .like-btn{font-size:12px;font-weight:500;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;margin-left:auto;white-space:nowrap}
  .like-btn:hover{border-color:rgba(255,101,132,0.4);color:#ff6584}
  .like-btn.liked{border-color:rgba(255,101,132,0.4);color:#ff6584;background:rgba(255,101,132,0.08)}
  .view-more{font-size:12px;color:var(--muted);opacity:0.6;white-space:nowrap}
  .empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
  .skeleton{background:linear-gradient(90deg,var(--card) 25%,#1e1e2a 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .skeleton-media{height:200px}
  .skeleton-body{padding:22px 24px;display:flex;flex-direction:column;gap:12px}
  .skeleton-line{height:14px;border-radius:4px}
  footer{text-align:center;padding:32px;border-top:1px solid var(--border);color:var(--muted);font-size:13px;position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;align-items:center}
  .footer-links{display:flex;gap:20px;align-items:center;flex-wrap:wrap;justify-content:center}
  .footer-link{color:var(--muted);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;transition:color 0.2s}
  .footer-link:hover{color:var(--accent)}
  @media(max-width:600px){header{padding:60px 20px 40px}.stats-bar{gap:24px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="committee-label">Committee Showcase</div>
  <h1>What We've<br/><span>Been Building</span></h1>
  <p class="subtitle">A living archive of projects built by our members.</p>
  <div class="header-actions">
    <a href="member.html" class="btn btn-primary">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Submit Your Project
    </a>
    <a href="member.html" class="btn btn-ghost">Member Login</a>
    <a href="admin.html" class="btn btn-ghost">Admin</a>
  </div>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-number" id="stat-count">—</div><div class="stat-label">Projects</div></div>
  <div class="stat"><div class="stat-number" id="stat-members">—</div><div class="stat-label">Members</div></div>
</div>

<main>
  <div class="section-title">All Projects</div>
  <div class="grid" id="grid">
    <div class="skeleton-card"><div class="skeleton skeleton-media"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:40%"></div><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line" style="width:65%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-media"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:40%"></div><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line" style="width:65%"></div></div></div>
    <div class="skeleton-card"><div class="skeleton skeleton-media"></div><div class="skeleton-body"><div class="skeleton skeleton-line" style="width:40%"></div><div class="skeleton skeleton-line" style="width:80%"></div><div class="skeleton skeleton-line" style="width:65%"></div></div></div>
  </div>
</main>

<footer>
  <div class="footer-links">
    <a href="https://github.com/Open-Source-Community/backend-learning-hub-26" target="_blank" class="footer-link">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHub
    </a>
    <span style="color:var(--border)">·</span>
    <a href="https://www.facebook.com/share/17Dh6f18jz/" target="_blank" class="footer-link">
      <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      Facebook
    </a>
    <span style="color:var(--border)">·</span>
    <a href="member.html" class="footer-link">Join us</a>
  </div>
  <div style="font-size:12px;opacity:0.4">Open Source Community</div>
</footer>

<script>
  const API = window.location.hostname === 'localhost' || window.location.protocol === 'file:'
    ? 'http://localhost:3000'
    : 'https://committee-showcase.vercel.app';

  function getToken() { return localStorage.getItem('accessToken'); }
  function getUser()  { try { return JSON.parse(localStorage.getItem('user')||'null'); } catch(e){ return null; } }

  function initials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
  function formatDate(iso){return new Date(iso).toLocaleDateString('en-US',{month:'short',year:'numeric'})}
  function youtubeEmbed(url){if(!url)return null;const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);return m?`https://www.youtube.com/embed/${m[1]}`:null}

  function renderMedia(p){
    const embed=youtubeEmbed(p.video_url);
    if(embed) return `<div class="card-media"><iframe src="${embed}" loading="lazy"></iframe></div>`;
    if(p.video_url) return `<div class="card-media"><video src="${p.video_url}" preload="metadata"></video></div>`;
    if(p.image_urls&&p.image_urls.length) return `<div class="card-media"><img src="${p.image_urls[0]}" alt="${p.title}" loading="lazy"/></div>`;
    return `<div class="card-media"><div class="media-placeholder"><svg width="48" height="48" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div></div>`;
  }

  function renderCard(p, index){
    const liked = !!p.user_liked;
    const links = [
      p.repo_url     ? `<a href="${p.repo_url}"     target="_blank" class="link-btn"           onclick="event.stopPropagation()">↗ Repo</a>`    : '',
      p.demo_url     ? `<a href="${p.demo_url}"     target="_blank" class="link-btn secondary"  onclick="event.stopPropagation()">↗ Demo</a>`    : '',
      p.postman_url  ? `<a href="${p.postman_url}"  target="_blank" class="link-btn postman"    onclick="event.stopPropagation()">
        <svg width="12" height="12" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.163 0 0 7.163 0 16s7.163 16 16 16 16-7.163 16-16S24.837 0 16 0zm.75 24.5l-7.25-7.25 1.5-1.5 5.75 5.75 9.25-9.25 1.5 1.5-10.75 10.75z"/></svg>
        Postman</a>` : '',
    ].filter(Boolean).join('');

    return `
    <article class="card" style="animation-delay:${index*0.07}s" onclick="window.location.href='project.html?id=${p.id}'">
      ${renderMedia(p)}
      <div class="card-body">
        <div class="card-meta">
          <div class="creator-pill">
            <div class="avatar">${initials(p.creator_name)}</div>
            <span class="creator-name">${p.creator_name}</span>
          </div>
          <span class="card-date">${formatDate(p.submitted_at)}</span>
        </div>
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.description}</div>
      </div>
      <div class="card-footer">
        ${links}
        <span class="view-more">View details →</span>
        <button class="like-btn${liked?' liked':''}" id="like-${p.id}" onclick="toggleLike(event,'${p.id}')">
          <svg width="13" height="13" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          <span id="like-count-${p.id}">${p.likes||0}</span>
        </button>
      </div>
    </article>`;
  }

  async function toggleLike(event, projectId) {
    event.stopPropagation();
    const token = getToken();

    // Not logged in — redirect to member login
    if (!token) {
      if (confirm('You need to log in to like projects. Go to member login?')) {
        window.location.href = 'member.html';
      }
      return;
    }

    const btn = document.getElementById(`like-${projectId}`);
    const countEl = document.getElementById(`like-count-${projectId}`);

    try {
      const res = await fetch(`${API}/projects/${projectId}/like`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
      });

      if (res.status === 401) {
        if (confirm('Your session expired. Log in again to like projects?')) {
          window.location.href = 'member.html';
        }
        return;
      }

      const data = await res.json();

      // Update UI instantly
      countEl.textContent = data.likes;
      if (data.liked) {
        btn.classList.add('liked');
        btn.querySelector('svg').setAttribute('fill', 'currentColor');
      } else {
        btn.classList.remove('liked');
        btn.querySelector('svg').setAttribute('fill', 'none');
      }
    } catch(err) {
      console.error('Like failed:', err);
    }
  }

  async function loadProjects(){
    try{
      const token = getToken();
      const res=await fetch(`${API}/projects`, {
        headers: token ? { 'Authorization': `Bearer ${token}` } : {},
      });
      const data=await res.json();
      const projects=data.projects||[];
      const grid=document.getElementById('grid');

      if(!projects.length){
        grid.innerHTML=`<div class="empty"><p>No projects yet. Be the first to submit one.</p></div>`;
      }else{
        grid.innerHTML=projects.map(renderCard).join('');
      }
      document.getElementById('stat-count').textContent=projects.length;
      document.getElementById('stat-members').textContent=new Set(projects.map(p=>p.creator_name)).size;
    }catch(err){
      document.getElementById('grid').innerHTML=`<div class="empty"><p>Could not load projects. Make sure the server is running.</p></div>`;
    }
  }

  loadProjects();
</script>
</body>
</html>
